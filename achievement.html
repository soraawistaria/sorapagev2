<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/250560748f.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sora's Achievements</title>
    <link rel="icon" type="image/jpg" href="images/favicon.png">
</head>
<body class="bg-[#F7EBE0]">
    <nav class="bg-[#d65571] sticky top-0 z-50 relative backdrop-blur-md border-b-5 border-[#F7EBE0] flex items-center">
        <a href="index.html">
            <div class="absolute top-0 left-0 h-full p-4 transition-transform duration-300 hover:-translate-y-1">
                <i class="fa-solid fa-left-long text-[#F7EBE0]"></i>
            </div>
        </a>
        <div class="flex items-center justify-center mx-auto">
            <a href="experience.html">
                <div class="p-4">
                    <p class="text-[#F7EBE0] transition-transform duration-300 hover:-translate-y-1">Experiences</p>
                </div>
            </a>
            <a href="achievement.html">
                <div class="bg-[#F7EBE0] p-4">
                    <p class="text-[#d65571] font-semibold transition-transform duration-300 hover:-translate-y-1">Achievements</p>
                </div>
            </a>
            <a href="contacts.html">
                <div class="p-4">
                    <p class="text-[#F7EBE0] transition-transform duration-300 hover:-translate-y-1">Contacts</p>
                </div>
            </a>
        </div>
    </nav>

    <div class="grid grid-cols-2 h-[50px] items-center">
        <div class="text-center border-r-2 border-[#d65571]">
            <button onclick="show_section('high-school')" id="btn-hs" class="hover:font-bold font-bold text-[#d65571]">
                High School
            </button>
        </div>
        <div class="text-center border-l-2 border-[#d65571]">
            <button onclick="show_section('university')" id="btn-uni" class="hover:font-bold text-[#d65571]">
                University
            </button>
        </div>
    </div>

<!-- cards -->

<script>
    function show_section(sectionName) {
        const highschool = document.getElementById('HighSchool-section');
        const university = document.getElementById('University-section');
        const btnHS = document.getElementById('btn-hs');
        const btnUni = document.getElementById('btn-uni');

        if (sectionName === 'high-school') {
            highschool.classList.remove('hidden');
            university.classList.add('hidden');

            btnHS.className = "font-bold";
            btnUni.className = "hover:font-bold";
        } else {
            university.classList.remove('hidden');
            highschool.classList.add('hidden');

            btnUni.className = "font-bold"
            btnHS.className = "hover:font-bold"
        }
    }
</script>
</body>
</html>
